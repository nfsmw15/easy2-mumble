services:
  web:
    image: ghcr.io/nfsmw15/easy2-mumble:latest
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      DB_HOST: db
      DB_NAME: easy2mumble
      DB_USER: easy2
      DB_PASS: changeme          # bitte ändern
      DB_PREFIX: ml
      ADMIN_USER: admin
      ADMIN_PASS: changeme       # bitte ändern
      ADMIN_EMAIL: admin@example.com
      SITE_TITLE: "Mumble WebUI"
      SITE_TITLE_SHORT: "Mumble"
    volumes:
      - web_avatare:/var/www/html/avatare
      - web_config:/var/www/html/system/config
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: easy2mumble
      MARIADB_USER: easy2
      MARIADB_PASSWORD: changeme  # muss mit DB_PASS übereinstimmen
      MARIADB_ROOT_PASSWORD: rootchangeme
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  web_avatare:
  web_config:
